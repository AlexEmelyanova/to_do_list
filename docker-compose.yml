services:
    db:
        image: postgres:16
        container_name: todo_postgres
        restart: always
        env_file:
            - .env.docker
        ports:
            - "5433:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    app:
        build: .
        container_name: todo_app
        restart: always
        env_file:
            - .env.docker
        ports:
            - "8000:8000"
        depends_on:
            - db
        command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
    postgres_data: